name: WAIQ Daily Radar Execution

on:
  schedule:
    - cron: '0 8 * * *' # 8:00 AM UTC todos los días
  workflow_dispatch: # Permite ejecución manual con parámetros
    inputs:
      mode:
        description: 'Modo de ejecución'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - only-fetch
          - only-publish
      since:
        description: 'Fecha inicio (YYYY-MM-DD)'
        required: false

jobs:
  radar_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para hacer push al repo
    
    steps:
      - name: Checkout Engine Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Acelera ejecuciones futuras

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Radar Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
          # Usamos la ruta del .env pero inyectada por el workflow
          OUTPUT_DIR: ${{ vars.OUTPUT_DIR || './output' }}
        run: |
          # Construimos el comando basado en si hay fecha manual o no
          MODE="${{ github.event.inputs.mode || 'full' }}"
          SINCE="${{ github.event.inputs.since }}"
          
          if [ -z "$SINCE" ]; then
            python radar.py $MODE
          else
            python radar.py $MODE --since $SINCE
          fi

      - name: Upload Logs as Artifacts
        if: always() # Guarda los logs incluso si el script falla
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Deploy to WAIQ Multi
        if: success() && (github.event.inputs.mode == 'full' || github.event.inputs.mode == 'only-publish' || github.event_name == 'schedule')
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: ${{ vars.OUTPUT_DIR || './output' }}
        run: |
          git config --global user.name "WAIQ Radar Bot"
          git config --global user.email "hi@jln.bz"
          
          # Clonamos el repositorio de destino (hugo)
          git clone https://x-access-token:${GH_PAT}@github.com/jota-ele-ene/waiq-multi.git target_repo
          
          # Sincronizamos contenidos y estáticos (imágenes)
          cp -r ${OUTPUT_DIR}/es/* target_repo/content/es/article/ || true
          cp -r ${OUTPUT_DIR}/en/* target_repo/content/en/article/ || true
          
          # Si el script generó imágenes, las movemos a la carpeta de assets de Hugo
          mkdir -p target_repo/static/images/upload/
          cp -r ${OUTPUT_DIR}/static/images/* target_repo/static/images/upload/ || true
          
          cd target_repo
          git add .
          git commit -m "Radar Update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin main